name: Bug report
description: Something is broken or behaves unexpectedly
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much of
        the template as you can — the more context you give, the faster the
        fix lands.

        **Security issue?** Do not file here. Email `info@malziland.at`
        instead; see [SECURITY.md](../blob/main/SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you do, what did you expect, what actually happened?
      placeholder: |
        I clicked "Backups jetzt hochladen". I expected the banner to show
        progress. Instead I got an HTTP 500 and an empty folder was created
        on Seafile.
    validations:
      required: true

  - type: textarea
    id: activity-log
    attributes:
      label: Activity log excerpt
      description: |
        Admin → Seafile Backup → Aktivitätsprotokoll → **Als Textdatei exportieren**.
        Paste the last 20–30 lines here. **Scrub the site domain / library name
        if you consider it sensitive.**
      render: text
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: e.g. 1.3.1
    validations:
      required: true

  - type: input
    id: wp-version
    attributes:
      label: WordPress version
      placeholder: e.g. 6.6.2
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: e.g. 8.1.27
    validations:
      required: true

  - type: input
    id: seafile-version
    attributes:
      label: Seafile server version
      placeholder: e.g. 11.0.10 community, or "seacloud.cc hosted"
    validations:
      required: true

  - type: dropdown
    id: proxy
    attributes:
      label: Reverse proxy in front of Seafile
      options:
        - Cloudflare Tunnel (free tier, 100 MB limit)
        - Cloudflare Tunnel (paid tier)
        - nginx with custom client_max_body_size
        - Traefik
        - Direct — no proxy
        - Other / unsure
    validations:
      required: true

  - type: textarea
    id: settings
    attributes:
      label: Relevant settings
      description: Chunk size, retention, strict verify on/off, auto/manual, delete local.
      placeholder: |
        Chunk size: 40 MB
        Retention: 4
        Strict verify: off
        Auto-upload: on
        Delete local: off

  - type: textarea
    id: php-error-log
    attributes:
      label: PHP error log (optional)
      description: Anything from `wp-content/debug.log` or your PHP-FPM log around the time of the incident.
      render: text
