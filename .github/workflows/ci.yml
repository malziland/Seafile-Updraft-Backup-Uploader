name: CI

on:
  push:
    branches: [main, 'fix/**', 'feature/**']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHP Lint (${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Syntax check all PHP files
        run: find . -name '*.php' -not -path './vendor/*' -not -path './.git/*' -print0 | xargs -0 -n1 -P4 php -l

  phpcs:
    name: WordPress Coding Standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      - name: Run PHPCS (WordPress standard)
        run: ./vendor/bin/phpcs --extensions=php --ignore=vendor,languages,assets,tests,.github,scripts .

  phpstan:
    name: PHPStan (Level 5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --level=5 --memory-limit=2G --no-progress seafile-updraft-backup-uploader.php

  phpunit:
    name: PHPUnit (${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      - name: Run test suite
        run: ./vendor/bin/phpunit --testdox

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
